spring:
  application:
    name: xiaozhiMed
  data:
    mongodb:
      uri: mongodb://localhost:27017/chat_memory_db

#  datasource:
#    url: jdbc:mysql://localhost:3306/sky_take_out?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
#    username: root
#    password: 123456

mybatis:
  configuration:
    map-underscore-to-camel-case: true

langchain4j:
  open-ai:
    chat-model:
      # 从系统环境变量中读取 DashScope API Key
      api-key: ${DASHSCOPE_API_KEY}
      model-name: deepseek-v3
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  community:
    dashscope:
      chat-model:
        api-key: ${DASHSCOPE_API_KEY}
        model-name: qwen-plus

logging:
  level:
    root: info

springdoc:
  swagger-ui:
    # 将 Swagger UI 页面固定到 /doc.html，方便直接通过浏览器调试接口。
    path: /doc.html

